name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell scripts syntax
        run: |
          bash -n scripts/create_skill.sh
          bash -n scripts/weekly_review.sh
          bash -n scripts/log_task_run.sh
          bash -n scripts/metrics_report.sh
          bash -n skills/agent-optsmith/scripts/setup_loop_workspace.sh
          bash -n skills/agent-optsmith/scripts/log_task_run.sh
          bash -n skills/agent-optsmith/scripts/weekly_review.sh
          bash -n skills/agent-optsmith/scripts/metrics_report.sh
          bash -n .agents/skills/optsmith-repo-maintainer/scripts/sync_runtime_to_installable_skill.sh
          bash -n .agents/skills/optsmith-repo-maintainer/scripts/check_readme_sync.sh
          bash -n .agents/skills/optsmith-repo-maintainer/scripts/validate_repo_workflow.sh
          bash -n .agents/skills/optsmith-repo-maintainer/scripts/install_to_codex.sh
          bash -n .agents/skills/optsmith-cli-maintainer/scripts/check_cli_version_bump.sh
          bash -n .agents/skills/optsmith-workflow-maintainer/scripts/check_ci_workflow.sh

      - name: Workflow policy checks
        run: |
          set -euxo pipefail
          bash .agents/skills/optsmith-workflow-maintainer/scripts/check_ci_workflow.sh

      - name: Repository quick validation
        run: |
          set -euxo pipefail
          bash .agents/skills/optsmith-cli-maintainer/scripts/check_cli_version_bump.sh
          bash .agents/skills/optsmith-repo-maintainer/scripts/check_readme_sync.sh
          PYTHONPATH="$(pwd)" python3 -m optsmith_cli.cli help >/dev/null
          runtime_scripts=(log_task_run.sh metrics_report.sh weekly_review.sh auto_run_loop.sh optimize_skill.sh dashboard_server.sh dashboard_server.py)
          for f in "${runtime_scripts[@]}"; do
            cmp -s "scripts/${f}" "skills/agent-optsmith/scripts/${f}"
            cmp -s "skills/agent-optsmith/scripts/${f}" "optsmith_cli/resources/skills/agent-optsmith/scripts/${f}"
          done
