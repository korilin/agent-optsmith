name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell scripts syntax
        run: |
          bash -n scripts/create_skill.sh
          bash -n scripts/weekly_review.sh
          bash -n scripts/log_task_run.sh
          bash -n scripts/metrics_report.sh

      - name: Run smoke checks
        run: |
          chmod +x scripts/*.sh
          ./scripts/create_skill.sh ci-smoke-skill
          ./scripts/log_task_run.sh --task-id TASK-CI-1 --task-type debug --project ci --model gpt-5 --used-skill false --total-tokens 100 --duration-sec 12 --success true
          ./scripts/weekly_review.sh
          ./scripts/metrics_report.sh --all
